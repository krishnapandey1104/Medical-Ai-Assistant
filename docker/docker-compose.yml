version: "3.9"

services:

  # =========================
  # OLLAMA (LLM ENGINE)
  # =========================
  ollama:
    image: ollama/ollama
    container_name: ollama

    ports:
      - "11434:11434"

    volumes:
      - ollama_data:/root/.ollama

    restart: always

    entrypoint: ["/bin/sh", "-c"]
    command: >
      ollama serve &
      echo "⏳ Waiting for Ollama..." &&
      until ollama list > /dev/null 2>&1; do sleep 2; done &&
      ollama pull llama3:latest &&
      ollama pull phi3:latest &&
      echo "✅ Models ready" &&
      wait


  # =========================
  # FASTAPI BACKEND
  # =========================
  medical-ai:
    build:
      context: ..                       # IMPORTANT
      dockerfile: docker/Dockerfile

    container_name: medical_ai_system

    ports:
      - "8000:8000"

    volumes:
      - ../vector_db:/app/vector_db
      - ../medical_knowledge:/app/medical_knowledge

    env_file:
      - ../.env

    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_BASE_URL=http://ollama:11434

    depends_on:
      - ollama

    restart: always


volumes:
  ollama_data: