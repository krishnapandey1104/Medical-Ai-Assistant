version: "3.9"

services:

  ollama:
    image: ollama/ollama
    container_name: ollama

    ports:
      - "11434:11434"

    volumes:
      - ollama_data:/root/.ollama

    command: serve

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s


  medical-ai:
    build:
      context: ..
      dockerfile: docker/Dockerfile

    container_name: medical_ai_system

    ports:
      - "8000:8000"

    volumes:
      - ../vector_db:/app/vector_db
      - ../medical_knowledge:/app/medical_knowledge

    env_file:
      - ../.env

    environment:
      - PYTHONUNBUFFERED=1
      - DOCKER_ENV=true
      - OLLAMA_BASE_URL=http://ollama:11434

    depends_on:
      ollama:
        condition: service_healthy

    restart: unless-stopped


volumes:
  ollama_data: